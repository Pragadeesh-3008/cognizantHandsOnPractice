# ============================================================
#  OrmLearn — Spring Data JPA Hands-On Configuration
# ============================================================

# ---- H2 In-Memory Database (Default for Hands-On) ----------
spring.datasource.url=jdbc:h2:mem:ormlearndb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- MySQL Configuration (Uncomment to switch to MySQL) ----
# spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=root

# ---- JPA / Hibernate Settings ------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# For MySQL use: spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- SQL Initialiser (runs data.sql after DDL) -------------
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---- H2 Web Console ----------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Server Port -------------------------------------------
server.port=8080

# ---- Logging -----------------------------------------------
logging.level.com.ormlearn=DEBUG
logging.level.org.springframework.transaction=DEBUG
